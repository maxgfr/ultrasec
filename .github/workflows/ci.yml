name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 20 is the dev-toolchain floor (vitest 4 needs >=20.19); 24 is current.
        # The published bundle's Node 18 floor is covered by runtime-node-floor.
        node-version: [20, 24]
    name: build-test (node ${{ matrix.node-version }})
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build is reproducible (committed bundle up to date)
        run: pnpm run check:build # sync-engine --check (vendored engine drift) + tsup + copy-bundle + git diff over both bundles + verify:bundle

      - name: Test
        run: pnpm test

      - name: Smoke-run the committed bundle (offline, fixture repo)
        run: pnpm run demo

      - name: Assert the audit dossier was produced
        run: test -f /tmp/ultrasec-demo/findings.json && test -f /tmp/ultrasec-demo/DOSSIER.md

  install-bundle:
    runs-on: ubuntu-latest
    name: install-bundle (skill installs whole, not just SKILL.md)
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the embedded bundle
        run: pnpm run build

      - name: Verify the install-bundle shape (no root SKILL.md, engine in sync)
        run: pnpm run verify:bundle

      - name: End-to-end — `skills add` bundles the engine + references, not SKILL.md alone
        run: |
          WORK="$(mktemp -d)"
          cd "$WORK"
          npx --yes skills add "$GITHUB_WORKSPACE" --skill ultrasec --agent claude-code --copy -y
          DIR=.claude/skills/ultrasec
          test -f "$DIR/SKILL.md"               || { echo "::error::SKILL.md not installed"; exit 1; }
          test -f "$DIR/scripts/ultrasec.mjs"   || { echo "::error::engine not bundled — skills add dropped scripts/"; exit 1; }
          test -d "$DIR/references"             || { echo "::error::references/ not bundled"; exit 1; }
          node "$DIR/scripts/ultrasec.mjs" --help > /dev/null || { echo "::error::installed engine does not run"; exit 1; }
          echo "install-bundle: skill installed whole and the engine runs."

  # The shipped scripts/ultrasec.mjs is a dependency-free bundle that declares
  # engines.node ">=18", but the dev toolchain (vitest 4) needs Node >=20.19 — so
  # build-test above can't prove the floor. This job runs ONLY the committed
  # bundle on Node 18, with no install, to guarantee the published ">=18" promise
  # holds (a Node 20+ API sneaking into src/ would build green on Node 24 yet
  # break for real users on 18; this catches that).
  runtime-node-floor:
    runs-on: ubuntu-latest
    name: runtime (Node 18 floor, zero-dep bundle)
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 18

      - name: Scan + check a fixture on Node 18
        run: |
          node scripts/ultrasec.mjs scan --repo tests/fixtures/vuln-express --out "$RUNNER_TEMP/u18"
          test -f "$RUNNER_TEMP/u18/findings.json"
          test -f "$RUNNER_TEMP/u18/DOSSIER.md"
          node scripts/ultrasec.mjs tools --json | node -e "process.stdin.resume()"
