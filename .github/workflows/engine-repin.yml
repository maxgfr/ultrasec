name: Engine re-pin

# Daily check for a new codeindex (https://github.com/maxgfr/codeindex) release.
# If the pinned engine is stale, re-pins it, rebuilds the bundle, and runs the
# same gates as ci.yml. All green -> pushed straight to main (a GITHUB_TOKEN
# push triggers no workflows, so release.yml/ci.yml are kicked off explicitly
# via workflow_dispatch). Any gate red -> nothing is pushed and no PR is
# opened; the run just fails and the next daily cron retries. A red run is
# the signal to investigate locally.
on:
  schedule:
    - cron: "59 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

concurrency: engine-repin

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  repin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect latest codeindex release
        id: detect
        run: |
          PINNED=$(node -p "require('./src/vendor/engine.meta.json').tag")
          LATEST=$(gh api repos/maxgfr/codeindex/releases --jq '[.[] | select(.tag_name | test("^v[0-9]")) | .tag_name] | first')
          if [ -z "$LATEST" ]; then
            echo "::error::could not determine latest codeindex release tag"
            exit 1
          fi
          echo "pinned=$PINNED" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$PINNED" = "$LATEST" ]; then
            echo "up to date ($PINNED)"
            echo "stale=false" >> "$GITHUB_OUTPUT"
          else
            echo "stale: $PINNED -> $LATEST"
            echo "stale=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git identity
        if: steps.detect.outputs.stale == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Re-pin engine
        if: steps.detect.outputs.stale == 'true'
        env:
          LATEST: ${{ steps.detect.outputs.latest }}
        run: |
          node scripts/sync-engine.mjs --ref "$LATEST"
          node scripts/sync-engine.mjs --check

      - name: Typecheck
        if: steps.detect.outputs.stale == 'true'
        run: pnpm run typecheck

      - name: Lint
        if: steps.detect.outputs.stale == 'true'
        run: pnpm run lint

      - name: Rebuild bundle (tsup + copy-bundle)
        if: steps.detect.outputs.stale == 'true'
        run: pnpm run build

      # check:build's own git-diff gate compares the rebuilt bundle against
      # HEAD, so the rebuilt bundle has to be committed first (this repo's
      # local/CI flow: build, then commit, then check:build). On red gates
      # nothing is pushed — this commit never leaves the runner.
      - name: Commit re-pinned engine + rebuilt bundle
        if: steps.detect.outputs.stale == 'true'
        env:
          LATEST: ${{ steps.detect.outputs.latest }}
        run: |
          git add src/vendor/engine.meta.json src/vendor/codeindex-engine.mjs src/vendor/codeindex-engine.d.mts scripts/ultrasec.mjs skills/ultrasec/scripts/ultrasec.mjs
          git commit -m "feat(engine): re-pin codeindex $LATEST" -m "Automated re-pin. Gates run next; this commit is the adjudication material regardless of outcome."

      - name: Build is reproducible (committed bundle up to date)
        if: steps.detect.outputs.stale == 'true'
        run: pnpm run check:build

      - name: Test
        if: steps.detect.outputs.stale == 'true'
        run: |
          set -o pipefail
          pnpm test 2>&1 | tee /tmp/repin-test.log

      - name: Smoke-run the committed bundle (offline, fixture repo)
        if: steps.detect.outputs.stale == 'true'
        run: pnpm run demo:offline

      - name: Assert the audit dossier was produced
        if: steps.detect.outputs.stale == 'true'
        run: test -f /tmp/ultrasec-demo/findings.json && test -f /tmp/ultrasec-demo/DOSSIER.md

      - name: All gates green — finalize commit and push to main
        if: steps.detect.outputs.stale == 'true'
        id: push
        env:
          LATEST: ${{ steps.detect.outputs.latest }}
        run: |
          SUMMARY=$(grep -E "Tests +[0-9]+ passed" /tmp/repin-test.log | tail -1)
          git commit --amend -m "feat(engine): re-pin codeindex $LATEST" -m "automated re-pin, all gates green, goldens byte-identical. ${SUMMARY:-test summary unavailable}."
          git pull --rebase origin main
          git push origin HEAD:main
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger release workflow
        if: steps.detect.outputs.stale == 'true'
        run: gh workflow run release.yml --ref main

      - name: Trigger CI workflow
        if: steps.detect.outputs.stale == 'true'
        run: gh workflow run ci.yml --ref main
