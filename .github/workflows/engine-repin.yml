name: Engine re-pin

# Daily check for a new codeindex (https://github.com/maxgfr/codeindex) release.
# If the pinned engine is stale, re-pins it, rebuilds the bundle, and runs the
# same gates as ci.yml. All green -> pushed straight to main (a GITHUB_TOKEN
# push triggers no workflows, so release.yml/ci.yml are kicked off explicitly
# via workflow_dispatch). Any gate red -> the synced state (adjudication
# material, not thrown away) goes to a repin/<tag> branch with a PR for a
# human to classify golden diffs. Never auto-regenerates a golden/snapshot.
on:
  schedule:
    - cron: "59 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write
  pull-requests: write

concurrency: engine-repin

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  repin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect latest codeindex release
        id: detect
        run: |
          PINNED=$(node -p "require('./src/vendor/engine.meta.json').tag")
          LATEST=$(gh api repos/maxgfr/codeindex/releases --jq '[.[] | select(.tag_name | test("^v[0-9]")) | .tag_name] | first')
          if [ -z "$LATEST" ]; then
            echo "::error::could not determine latest codeindex release tag"
            exit 1
          fi
          echo "pinned=$PINNED" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$PINNED" = "$LATEST" ]; then
            echo "up to date ($PINNED)"
            echo "stale=false" >> "$GITHUB_OUTPUT"
          else
            echo "stale: $PINNED -> $LATEST"
            echo "stale=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git identity
        if: steps.detect.outputs.stale == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Re-pin engine
        if: steps.detect.outputs.stale == 'true'
        env:
          LATEST: ${{ steps.detect.outputs.latest }}
        run: |
          node scripts/sync-engine.mjs --ref "$LATEST"
          node scripts/sync-engine.mjs --check

      - name: Typecheck
        if: steps.detect.outputs.stale == 'true'
        run: pnpm run typecheck

      - name: Lint
        if: steps.detect.outputs.stale == 'true'
        run: pnpm run lint

      - name: Rebuild bundle (tsup + copy-bundle)
        if: steps.detect.outputs.stale == 'true'
        run: pnpm run build

      # check:build's own git-diff gate compares the rebuilt bundle against
      # HEAD, so the rebuilt bundle has to be committed first (this repo's
      # local/CI flow: build, then commit, then check:build). This commit is
      # also the adjudication material if a later gate goes red — it stays
      # even on failure.
      - name: Commit re-pinned engine + rebuilt bundle
        if: steps.detect.outputs.stale == 'true'
        env:
          LATEST: ${{ steps.detect.outputs.latest }}
        run: |
          git add src/vendor/engine.meta.json src/vendor/codeindex-engine.mjs src/vendor/codeindex-engine.d.mts scripts/ultrasec.mjs skills/ultrasec/scripts/ultrasec.mjs
          git commit -m "feat(engine): re-pin codeindex $LATEST" -m "Automated re-pin. Gates run next; this commit is the adjudication material regardless of outcome."

      - name: Build is reproducible (committed bundle up to date)
        if: steps.detect.outputs.stale == 'true'
        run: pnpm run check:build

      - name: Test
        if: steps.detect.outputs.stale == 'true'
        run: |
          set -o pipefail
          pnpm test 2>&1 | tee /tmp/repin-test.log

      - name: Smoke-run the committed bundle (offline, fixture repo)
        if: steps.detect.outputs.stale == 'true'
        run: pnpm run demo:offline

      - name: Assert the audit dossier was produced
        if: steps.detect.outputs.stale == 'true'
        run: test -f /tmp/ultrasec-demo/findings.json && test -f /tmp/ultrasec-demo/DOSSIER.md

      - name: All gates green — finalize commit and push to main
        if: steps.detect.outputs.stale == 'true'
        id: push
        env:
          LATEST: ${{ steps.detect.outputs.latest }}
        run: |
          SUMMARY=$(grep -E "Tests +[0-9]+ passed" /tmp/repin-test.log | tail -1)
          git commit --amend -m "feat(engine): re-pin codeindex $LATEST" -m "automated re-pin, all gates green, goldens byte-identical. ${SUMMARY:-test summary unavailable}."
          git pull --rebase origin main
          git push origin HEAD:main
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger release workflow
        if: steps.detect.outputs.stale == 'true'
        run: gh workflow run release.yml --ref main

      - name: Trigger CI workflow
        if: steps.detect.outputs.stale == 'true'
        run: gh workflow run ci.yml --ref main

      - name: On failure — push adjudication branch and open PR
        if: steps.detect.outputs.stale == 'true' && failure() && steps.push.outputs.pushed != 'true'
        env:
          LATEST: ${{ steps.detect.outputs.latest }}
        run: |
          BRANCH="repin/${LATEST}"
          git add -A
          git diff --cached --quiet || git commit -m "chore(engine): re-pin codeindex ${LATEST}" -m "Automated re-pin — gates failed, pushed for manual adjudication."
          git push origin HEAD:refs/heads/"$BRANCH" --force
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          if [ -z "$EXISTING" ]; then
            RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            BODY=$(printf 'Automated re-pin to codeindex %s failed one or more gates.\n\nRun: %s\n\nDoctrine: classify every golden diff (accept/reject, with reasoning) before ever regenerating a snapshot — a golden diff is a test failure, not something to wave through here. If the engine is genuinely producing wrong output, file an issue on maxgfr/codeindex instead of silently accepting the diff.\n' "$LATEST" "$RUN_URL")
            gh pr create \
              --title "engine re-pin ${LATEST}: gates failed — manual adjudication needed" \
              --head "$BRANCH" \
              --base main \
              --body "$BODY"
          else
            echo "PR #$EXISTING already open for $BRANCH, not duplicating."
          fi
